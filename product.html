<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>商品詳情 — 尾巴選物 WEIBA SELECT</title>
  <meta name="description" content="尾巴選物精選好物商品詳情。溫暖設計，真心嚴選。"/>
  <link rel="icon" href="logos/weiba-petshop-logo.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Outfit:wght@300;400;500;600&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/design.css"/>
  <style>
    .pd-wrap { max-width: 1200px; margin: 0 auto; padding: calc(var(--nav-h) + 40px) 8vw 100px; }
    .pd-crumb { font-family: var(--ff-en); font-size: 12.5px; color: var(--c-warm); margin-bottom: 36px; letter-spacing: 0.04em; }
    .pd-crumb a { color: var(--c-warm); text-decoration: none; }
    .pd-crumb a:hover { color: var(--c-terra); }
    .pd-main { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: start; }
    .pd-gallery { border-radius: 24px; overflow: hidden; background: var(--c-cream); aspect-ratio: 1; position: sticky; top: calc(var(--nav-h) + 24px); }
    .pd-gallery img { width: 100%; height: 100%; object-fit: cover; }
    .pd-badge { display: inline-block; background: var(--c-terra); color: #fff; font-family: var(--ff-en); font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; padding: 5px 14px; border-radius: 20px; margin-bottom: 18px; }
    .pd-cat { font-family: var(--ff-en); font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--c-sage); margin-bottom: 10px; }
    .pd-name { font-family: var(--ff-cn); font-size: clamp(28px, 4vw, 40px); font-weight: 700; color: var(--c-brown); line-height: 1.25; margin-bottom: 8px; }
    .pd-en { font-family: var(--ff-en); font-size: 15px; color: var(--c-warm); margin-bottom: 24px; letter-spacing: 0.02em; }
    .pd-price { font-family: var(--ff-en); font-size: 30px; font-weight: 600; color: var(--c-brown); margin-bottom: 28px; }
    .pd-price sub { font-size: 16px; font-weight: 400; color: var(--c-warm); vertical-align: baseline; margin-right: 5px; }
    .pd-desc { font-size: 15px; line-height: 1.9; color: var(--c-brown); margin-bottom: 32px; }
    .pd-feats { list-style: none; padding: 0; margin: 0 0 36px; display: grid; gap: 12px; }
    .pd-feats li { display: flex; align-items: flex-start; gap: 12px; font-size: 14px; color: var(--c-brown); line-height: 1.6; }
    .pd-feats svg { width: 18px; height: 18px; flex-shrink: 0; margin-top: 2px; fill: none; stroke: var(--c-terra); stroke-width: 2; }
    .pd-actions { display: flex; gap: 12px; align-items: stretch; }
    .pd-qty { display: inline-flex; align-items: center; border: 1.5px solid var(--c-light); border-radius: 14px; overflow: hidden; }
    .pd-qty button { width: 44px; height: 52px; border: none; background: var(--c-beige); font-size: 20px; color: var(--c-brown); cursor: pointer; transition: background 0.2s; }
    .pd-qty button:hover { background: var(--c-light); }
    .pd-qty span { width: 48px; text-align: center; font-family: var(--ff-en); font-size: 17px; font-weight: 500; color: var(--c-brown); }
    .pd-addcart { flex: 1; background: var(--c-brown); color: #fff; border: none; border-radius: 14px; font-family: var(--ff-cn); font-size: 16px; font-weight: 500; cursor: pointer; transition: background 0.25s, transform 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .pd-addcart:hover { background: var(--c-terra); transform: translateY(-1px); }
    .pd-addcart.added { background: var(--c-sage); }
    .pd-wish2 { width: 52px; border: 1.5px solid var(--c-light); border-radius: 14px; background: var(--c-beige); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: background 0.2s; }
    .pd-wish2 svg { width: 22px; height: 22px; fill: none; stroke: var(--c-warm); stroke-width: 1.8; transition: fill 0.2s, stroke 0.2s; }
    .pd-wish2.active svg { fill: var(--c-terra); stroke: var(--c-terra); }
    .pd-wish2.active { background: rgba(196,119,90,0.12); }
    /* 相關推薦 */
    .pd-related { margin-top: 100px; }
    .pd-related h2 { font-family: var(--ff-cn); font-size: 24px; font-weight: 700; color: var(--c-brown); margin-bottom: 28px; }
    .pd-rel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 24px; }
    .pd-rel-card { text-decoration: none; background: #fff; border-radius: 18px; overflow: hidden; transition: transform 0.3s, box-shadow 0.3s; display: block; }
    .pd-rel-card:hover { transform: translateY(-6px); box-shadow: 0 20px 48px rgba(109,84,65,0.14); }
    .pd-rel-card .img { aspect-ratio: 1; overflow: hidden; background: var(--c-cream); }
    .pd-rel-card .img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
    .pd-rel-card:hover .img img { transform: scale(1.06); }
    .pd-rel-card .info { padding: 16px 18px 20px; }
    .pd-rel-card .name { font-family: var(--ff-cn); font-size: 15px; font-weight: 700; color: var(--c-brown); margin-bottom: 4px; }
    .pd-rel-card .price { font-family: var(--ff-en); font-size: 15px; color: var(--c-terra); font-weight: 600; }
    @media (max-width: 820px) {
      .pd-main { grid-template-columns: 1fr; gap: 36px; }
      .pd-gallery { position: relative; top: 0; }
    }
  </style>
</head>
<body>

<nav class="site-nav" role="navigation">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <img src="logos/weiba-petshop-logo-white.svg" alt="尾巴選物"/>
    </a>
    <ul class="nav-links" role="list">
      <li><a href="index.html"    class="nav-link">首頁</a></li>
      <li><a href="products.html" class="nav-link">選物</a></li>
      <li><a href="about.html"    class="nav-link">品牌</a></li>
      <li><a href="contact.html"  class="nav-link">聯絡</a></li>
    </ul>
    <button class="nav-hamburger" aria-label="選單">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<main class="pd-wrap">
  <p class="pd-crumb"><a href="index.html">首頁</a> / <a href="products.html">選物</a> / <span id="pd-crumb-name">商品</span></p>
  <div class="pd-main">
    <div class="pd-gallery">
      <img id="pd-img" src="" alt=""/>
    </div>
    <div class="pd-detail">
      <span class="pd-badge" id="pd-badge" hidden></span>
      <p class="pd-cat" id="pd-cat"></p>
      <h1 class="pd-name" id="pd-name"></h1>
      <p class="pd-en" id="pd-en"></p>
      <p class="pd-price"><sub>NT$</sub><span id="pd-price"></span></p>
      <p class="pd-desc" id="pd-desc"></p>
      <ul class="pd-feats" id="pd-feats"></ul>
      <div class="pd-actions">
        <div class="pd-qty">
          <button type="button" id="qty-minus" aria-label="減少">−</button>
          <span id="qty-val">1</span>
          <button type="button" id="qty-plus" aria-label="增加">＋</button>
        </div>
        <button class="pd-addcart" id="pd-addcart">加入購物車</button>
        <button class="pd-wish2" id="pd-wish" aria-label="收藏">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20s-7-4.4-9.3-8.6C1.2 8.3 2.6 5 6 5c2 0 3.2 1.3 4 2.5C10.8 6.3 12 5 14 5c3.4 0 4.8 3.3 3.3 6.4C19 15.6 12 20 12 20Z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <section class="pd-related">
    <h2>你可能也會喜歡</h2>
    <div class="pd-rel-grid" id="pd-related"></div>
  </section>
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <img src="logos/weiba-petshop-logo-white.svg" alt="尾巴選物"/>
      <p>精選每一件讓毛孩子幸福的好物。<br/>溫暖設計，真心嚴選。</p>
    </div>

      <a href="products.html">全部選物</a>

  <div class="footer-bottom">
    <span>© 2025 尾巴選物 WEIBA SELECT. All rights reserved.　網站設計與架設:<a href="https://bridgeseqlab.com" target="_blank" rel="noopener" style="color:#C4775A;">橋序創研 BridgeSeq Lab</a></span>
    <span>Made with <svg viewBox="0 0 24 24" width="13" height="13" style="display:inline-block;vertical-align:-1px;fill:#C4775A;" aria-hidden="true"><path d="M12 20s-7-4.4-9.3-8.6C1.2 8.3 2.6 5 6 5c2 0 3.2 1.3 4 2.5C10.8 6.3 12 5 14 5c3.4 0 4.8 3.3 3.3 6.4C19 15.6 12 20 12 20Z"/></svg> for pets & people</span>
  </div>

<script src="js/products-data.js"></script>
<script>
(function(){
  const params = new URLSearchParams(location.search);
  const id = parseInt(params.get('id'), 10) || 1;
  const p = (window.WEIBA_PRODUCTS || []).find(x => x.id === id) || (window.WEIBA_PRODUCTS||[])[0];
  if (!p) return;

  // 填入商品資料
  document.title = p.cn + ' — 尾巴選物';
  document.getElementById('pd-crumb-name').textContent = p.cn;
  const img = document.getElementById('pd-img'); img.src = p.img; img.alt = p.cn;
  const badge = document.getElementById('pd-badge');
  if (p.badge) { badge.textContent = p.badge; badge.hidden = false; }
  document.getElementById('pd-cat').textContent = p.catLabel || '';
  document.getElementById('pd-name').textContent = p.cn;
  document.getElementById('pd-en').textContent = p.en;
  document.getElementById('pd-price').textContent = p.price;
  document.getElementById('pd-desc').textContent = p.desc;

  // 賣點(由描述拆 + 通用)
  const feats = p.feats || ['嚴選材質，安心耐用', '溫暖設計，貼近毛孩需求', '快速到貨，售後支援'];
  const check = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 13l4 4L19 7"/></svg>';
  document.getElementById('pd-feats').innerHTML = feats.map(f => `<li>${check}<span>${f}</span></li>`).join('');

  // 數量
  let qty = 1;
  const qv = document.getElementById('qty-val');
  document.getElementById('qty-minus').onclick = () => { if (qty>1){ qty--; qv.textContent = qty; } };
  document.getElementById('qty-plus').onclick = () => { qty++; qv.textContent = qty; };

  // 加入購物車
  const addBtn = document.getElementById('pd-addcart');
  addBtn.onclick = () => {
    addBtn.textContent = `已加入 ${qty} 件 ✓`;
    addBtn.classList.add('added');
    setTimeout(() => { addBtn.textContent = '加入購物車'; addBtn.classList.remove('added'); }, 1800);
  };

  // 收藏
  const wish = document.getElementById('pd-wish');
  wish.onclick = () => wish.classList.toggle('active');

  // 相關推薦(同分類其他商品,最多 4)
  const related = (window.WEIBA_PRODUCTS||[]).filter(x => x.cat === p.cat && x.id !== p.id).slice(0,4);
  const fallback = (window.WEIBA_PRODUCTS||[]).filter(x => x.id !== p.id).slice(0,4);
  const rel = (related.length ? related : fallback);
  document.getElementById('pd-related').innerHTML = rel.map(r => `
    <a class="pd-rel-card" href="product.html?id=${r.id}">
      <div class="img"><img src="${r.img}" alt="${r.cn}"/></div>
      <div class="info"><p class="name">${r.cn}</p><p class="price">NT$ ${r.price}</p></div>
    </a>`).join('');
})();
</script>
</body>
